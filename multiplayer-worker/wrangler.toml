name = "conflito-multiplayer"
main = "src/index.ts"
compatibility_date = "2026-07-03"
compatibility_flags = ["nodejs_compat"]

# Sprint MP-04 — cada sala é um Durable Object independente
# ("GameRoom"); "AccountsRoom" é a única instância fixa que trata
# Login/Cadastro/Criar Sala/Entrar Sala antes de existir uma sala.
[[durable_objects.bindings]]
name = "ACCOUNTS"
class_name = "AccountsRoom"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AccountsRoom", "GameRoom"]
